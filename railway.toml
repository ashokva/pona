[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm && pnpm install && pnpm run build"

[deploy]
startCommand = "node apps/backend/dist/main.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[phases.setup]
nixPkgs = ['nodejs', 'python3']
aptPkgs = ['build-essential', 'libudev-dev']
